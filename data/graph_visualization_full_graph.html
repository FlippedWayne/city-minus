        // 颜色映射
        const typeColors = {
            'Boundary': '#e94560',
            'Point': '#00b4d8',
            'Policy': '#06d6a0',
            'STTE_Event': '#ffd166',
            'District': '#bb86fc',
            'PolicyGoal': '#ff6b6b',
            'PolicyMeasure': '#48dbfb',
            'Infrastructure': '#ff9a76',
            'LandUse': '#a8e6cf',
            'Keyword': '#dfe6e9',
            'DocumentChunk': '#b2bec3',
            'Unknown': '#636e72'
        };
        
        // 初始化画布
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 节点布局（使用服务端预计算位置，叠加少量力导向微调后固定）
        const nodePositions = {};
        nodes.forEach(node => {
            // 预计算坐标映射到画布
            const scaleX = width * 0.4;
            const scaleY = height * 0.4;
            nodePositions[node.id] = {
                x: width/2 + (node.x || 0) * scaleX,
                y: height/2 + (node.y || 0) * scaleY,
                vx: 0,
                vy: 0
            };
        });

        // 力导向布局——有限迭代后停止
        const MAX_ITERATIONS = 300;
        let iteration = 0;
        let running = true;

        function applyForces() {
            if (!running) return;
            const k = 0.005;
            const repulsion = 3000;

            // 节点间排斥
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const n1 = nodePositions[nodes[i].id];
                    const n2 = nodePositions[nodes[j].id];
                    const dx = n2.x - n1.x;
                    const dy = n2.y - n1.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    const force = repulsion / (dist * dist);

                    n1.vx -= (dx / dist) * force;
                    n1.vy -= (dy / dist) * force;
                    n2.vx += (dx / dist) * force;
                    n2.vy += (dy / dist) * force;
                }
            }

            // 边的吸引力
            edges.forEach(edge => {
                const n1 = nodePositions[edge.source];
                const n2 = nodePositions[edge.target];
                if (!n1 || !n2) return;

                const dx = n2.x - n1.x;
                const dy = n2.y - n1.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                const force = k * (dist - 100);

                n1.vx += (dx / dist) * force;
                n1.vy += (dy / dist) * force;
                n2.vx -= (dx / dist) * force;
                n2.vy -= (dy / dist) * force;
            });

            // 更新位置
            nodes.forEach(node => {
                const pos = nodePositions[node.id];
                pos.vx *= 0.85;  // 强阻尼——快速收敛
                pos.vy *= 0.85;
                pos.x += pos.vx;
                pos.y += pos.vy;

                pos.x = Math.max(30, Math.min(width - 30, pos.x));
                pos.y = Math.max(30, Math.min(height - 30, pos.y));
            });

            iteration++;
            if (iteration >= MAX_ITERATIONS) {
                running = false;
            }
        }

        // 动画循环——停止后固定
        function animate() {
            if (running) {
                applyForces();
            }
            draw();
            requestAnimationFrame(animate);
        }
        animate();
        
        // 绘制
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // 绘制边
            edges.forEach(edge => {
                const n1 = nodePositions[edge.source];
                const n2 = nodePositions[edge.target];
                if (!n1 || !n2) return;
                
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
            
            // 绘制节点
            nodes.forEach(node => {
                const pos = nodePositions[node.id];
                const color = typeColors[node.type] || typeColors['Unknown'];
                const radius = node.type === 'Boundary' ? 12 : 8;
                
                // 光晕效果
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius + 4, 0, Math.PI * 2);
                ctx.fillStyle = color + '40';
                ctx.fill();
                
                // 节点
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 标签
                ctx.fillStyle = '#fff';
                ctx.font = '11px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText(node.id.substring(0, 8), pos.x, pos.y + radius + 15);
            });
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            nodes.forEach(node => {
                const pos = nodePositions[node.id];
                if (query && node.id.toLowerCase().includes(query)) {
                    pos.highlighted = true;
                } else {
                    pos.highlighted = false;
                }
            });
        });
        
        // 点击节点
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            for (const node of nodes) {
                const pos = nodePositions[node.id];
                const dist = Math.sqrt((x - pos.x)**2 + (y - pos.y)**2);
                if (dist < 15) {
                    document.getElementById('nodeInfoText').innerHTML = `
                        <strong>${node.id}</strong><br>
                        类型: ${node.type}<br>
                        描述: ${node.description || '无'}
                    `;
                    break;
                }
            }
        });
    </script>
</body>
</html>
