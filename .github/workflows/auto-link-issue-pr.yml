name: Auto Link Issue & PR

on:
  pull_request:
    types: [opened, edited, reopened]
    branches: [ "**" ]

jobs:
  link-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description for issue references
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # 自动检测 PR 描述中的 "#数字" 或 "Fixes/Closes/Resolves #数字"
          echo "PR #${{ github.event.pull_request.number }}"
          echo "Body: $PR_BODY"

      - name: Auto-add PR to linked issue
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const issuePattern = /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(issuePattern)];
            for (const match of matches) {
              const issueNum = parseInt(match[1]);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNum,
                body: `🔗 Auto-linked PR #${context.payload.pull_request.number}`
              });
            }
